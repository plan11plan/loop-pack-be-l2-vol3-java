spring:
  main:
    web-application-type: none
  application:
    name: commerce-batch
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml
  batch:
    job:
      name: ${job.name:NONE}
    jdbc:
      initialize-schema: never

management:
  health:
    defaults:
      enabled: false

ranking:
  weights:
    default-version: v1
    versions:
      - version-key: v1
        view-weight: 1
        like-weight: 3
        order-weight: 10

---
# local: 개발용 프로파일
spring:
  config:
    activate:
      on-profile: local
  batch:
    job:
      name: weeklyRankJob
      enabled: false
    jdbc:
      initialize-schema: always
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: create

logging:
  level:
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.springframework.batch: INFO

---
spring:
  config:
    activate:
      on-profile: test
  batch:
    jdbc:
      initialize-schema: always

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

---
# scheduler: 데몬 모드로 띄워 weekly/monthly 잡을 cron 트리거
spring:
  config:
    activate:
      on-profile: scheduler
  main:
    web-application-type: servlet
  batch:
    job:
      enabled: false
ranking:
  scheduler:
    enabled: true