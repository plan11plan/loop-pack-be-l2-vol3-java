<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORDER / PAYMENT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            color: #000;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
            border-bottom: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 52px;
        }
        .header-back {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: #000;
            padding: 8px 0;
            line-height: 1;
        }
        .header-title {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .header-spacer { width: 30px; }

        /* Layout */
        .checkout-wrap {
            max-width: 640px;
            margin: 0 auto;
        }

        /* Section */
        .section {
            border-bottom: 1px solid #e5e5e5;
        }
        .section-header {
            padding: 20px 20px 0;
        }
        .section-title {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #999;
        }
        .section-body {
            padding: 16px 20px 24px;
        }

        /* Order Summary */
        .order-summary {
            padding: 28px 20px;
            border-bottom: 1px solid #e5e5e5;
        }
        .order-number {
            font-size: 11px;
            color: #999;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .order-amount-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .order-amount-label {
            font-size: 13px;
            font-weight: 400;
            color: #666;
        }
        .order-amount-value {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Payment Method */
        .method-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }
        .method-option {
            border: 1px solid #ddd;
            padding: 14px 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s;
            background: #fff;
            color: #333;
        }
        .method-option:hover {
            border-color: #999;
        }
        .method-option.selected {
            border-color: #000;
            background: #000;
            color: #fff;
            font-weight: 500;
        }

        /* Form */
        .form-row {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 0;
            border: none;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            letter-spacing: 2px;
            outline: none;
            transition: border-color 0.2s;
            background: transparent;
        }
        .form-input:focus {
            border-bottom-color: #000;
        }
        .form-input::placeholder {
            color: #ccc;
            letter-spacing: 2px;
        }

        /* Pay Button */
        .pay-section {
            padding: 20px;
            position: sticky;
            bottom: 0;
            background: #fff;
            border-top: 1px solid #e5e5e5;
        }
        .btn-pay {
            width: 100%;
            padding: 18px;
            background: #000;
            color: #fff;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-pay:hover { opacity: 0.85; }
        .btn-pay:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Status */
        .status-area {
            margin-top: 16px;
            padding: 20px;
            text-align: center;
            font-size: 13px;
            display: none;
            line-height: 1.6;
        }
        .status-processing {
            background: #fafafa;
            color: #666;
        }
        .status-success {
            background: #fafafa;
            color: #000;
        }
        .status-fail {
            background: #fafafa;
            color: #000;
        }
        .status-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .status-msg {
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 4px;
        }
        .status-sub {
            font-size: 12px;
            color: #999;
        }

        .btn-link {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 32px;
            background: #000;
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        .btn-link:hover { opacity: 0.85; }
        .btn-link.outline {
            background: #fff;
            color: #000;
            border: 1px solid #000;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 1.5px solid #ddd;
            border-top: 1.5px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .pg-footer {
            text-align: center;
            padding: 24px 20px 32px;
            font-size: 10px;
            color: #ccc;
            letter-spacing: 0.5px;
        }

        /* Divider */
        .divider {
            height: 8px;
            background: #f7f7f7;
            border-top: 1px solid #e5e5e5;
            border-bottom: 1px solid #e5e5e5;
        }
    </style>
</head>
<body>
    <div class="checkout-wrap">
        <div class="header">
            <button class="header-back" id="btn-back">&larr;</button>
            <span class="header-title">Order / Payment</span>
            <span class="header-spacer"></span>
        </div>

        <div class="order-summary">
            <div class="order-number" id="display-order-id">ORDER #</div>
            <div class="order-amount-row">
                <span class="order-amount-label">Total</span>
                <span class="order-amount-value" id="display-amount">0</span>
            </div>
        </div>

        <div id="payment-form">
            <div class="section">
                <div class="section-header">
                    <div class="section-title">Payment Method</div>
                </div>
                <div class="section-body">
                    <div class="method-options" id="card-options">
                        <div class="method-option selected" data-value="SAMSUNG">Samsung</div>
                        <div class="method-option" data-value="KB">KB</div>
                        <div class="method-option" data-value="HYUNDAI">Hyundai</div>
                        <div class="method-option" data-value="LOTTE">Lotte</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <div class="section-title">Card Information</div>
                </div>
                <div class="section-body">
                    <div class="form-row">
                        <label class="form-label">Card Number</label>
                        <input class="form-input" id="card-no" type="text"
                               placeholder="0000 - 0000 - 0000 - 0000" maxlength="19">
                    </div>
                </div>
            </div>

            <div class="pay-section">
                <button class="btn-pay" id="btn-pay">Pay Now</button>
                <div class="status-area" id="status-area"></div>
            </div>
        </div>

        <div class="pg-footer">PG PAYMENT SIMULATOR</div>
    </div>

    <script type="module">
        import { PaymentApi, OrderApi } from './js/api.js';

        const params = new URLSearchParams(location.search);
        const orderId = Number(params.get('orderId'));
        const amount = Number(params.get('amount'));
        const returnUrl = params.get('returnUrl') || '/shop/index.html#mypage';

        document.getElementById('btn-back').addEventListener('click', () => {
            location.href = returnUrl;
        });

        if (!orderId || !amount) {
            document.getElementById('payment-form').innerHTML =
                '<div style="padding:80px 20px;text-align:center;font-size:13px;color:#999">Invalid access. No order information.</div>';
            document.getElementById('display-amount').textContent = '0';
        } else {
            document.getElementById('display-amount').textContent =
                amount.toLocaleString() + '원';
            document.getElementById('display-order-id').textContent =
                'ORDER #' + String(orderId).padStart(6, '0');
            initPaymentForm();
        }

        function initPaymentForm() {
            let selectedCard = 'SAMSUNG';
            const btnPay = document.getElementById('btn-pay');
            const statusArea = document.getElementById('status-area');
            const cardNoInput = document.getElementById('card-no');

            // Card type selection
            document.querySelectorAll('.method-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('.method-option')
                        .forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    selectedCard = opt.dataset.value;
                });
            });

            // Card number auto-format
            cardNoInput.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, '').substring(0, 16);
                let formatted = v.match(/.{1,4}/g)?.join('-') || v;
                e.target.value = formatted;
            });

            btnPay.addEventListener('click', async () => {
                const cardNo = cardNoInput.value.trim();

                if (!cardNo || cardNo.replace(/-/g, '').length < 16) {
                    showStatus('fail',
                        '<div class="status-msg">카드 번호 16자리를 입력해주세요.</div>');
                    return;
                }

                btnPay.disabled = true;
                btnPay.textContent = 'PROCESSING...';
                showStatus('processing',
                    '<div class="spinner"></div>' +
                    '<div class="status-msg">결제를 요청하고 있습니다</div>' +
                    '<div class="status-sub">Please wait...</div>');

                try {
                    await PaymentApi.request({
                        orderId,
                        cardType: selectedCard,
                        cardNo
                    });
                    showStatus('processing',
                        '<div class="spinner"></div>' +
                        '<div class="status-msg">결제 승인 처리 중</div>' +
                        '<div class="status-sub">Approving payment...</div>');
                    pollOrderStatus();
                } catch (e) {
                    showStatus('fail',
                        '<div class="status-icon">-</div>' +
                        '<div class="status-msg">' + e.message + '</div>' +
                        '<button class="btn-link outline" id="btn-retry">Retry</button>');
                    document.getElementById('btn-retry').addEventListener('click', () => {
                        btnPay.disabled = false;
                        btnPay.textContent = 'PAY NOW';
                        statusArea.style.display = 'none';
                    });
                }
            });

            function pollOrderStatus() {
                const maxAttempts = 15;
                let attempts = 0;

                const interval = setInterval(async () => {
                    attempts++;
                    try {
                        const order = await OrderApi.get(orderId);
                        if (order.status === 'ORDERED') {
                            clearInterval(interval);
                            onPaymentComplete('SUCCESS');
                        } else if (attempts >= maxAttempts) {
                            clearInterval(interval);
                            onPaymentComplete('TIMEOUT');
                        }
                    } catch {
                        if (attempts >= maxAttempts) {
                            clearInterval(interval);
                            onPaymentComplete('TIMEOUT');
                        }
                    }
                }, 2000);
            }

            function onPaymentComplete(status) {
                if (status === 'SUCCESS') {
                    showStatus('success',
                        '<div class="status-icon">&#10003;</div>' +
                        '<div class="status-msg">결제가 완료되었습니다</div>' +
                        '<div class="status-sub">Payment completed successfully</div>' +
                        '<a class="btn-link" href="/shop/index.html#mypage">View Orders</a>');
                } else {
                    showStatus('fail',
                        '<div class="status-icon">!</div>' +
                        '<div class="status-msg">처리 중입니다</div>' +
                        '<div class="status-sub">주문 내역에서 확인해주세요</div>' +
                        '<a class="btn-link" href="/shop/index.html#mypage">View Orders</a>');
                }
                btnPay.style.display = 'none';
            }

            function showStatus(type, html) {
                statusArea.className = 'status-area status-' + type;
                statusArea.innerHTML = html;
                statusArea.style.display = 'block';
            }
        }
    </script>
</body>
</html>
