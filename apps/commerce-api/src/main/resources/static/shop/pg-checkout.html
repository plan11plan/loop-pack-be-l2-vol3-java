<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Payment - 결제</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        .checkout-container {
            max-width: 520px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        .checkout-header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .checkout-header .back-btn {
            color: white;
            text-decoration: none;
            font-size: 20px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
        }
        .checkout-header h1 { font-size: 16px; font-weight: 600; }
        .checkout-amount {
            padding: 32px 24px;
            text-align: center;
            border-bottom: 8px solid #f5f5f5;
        }
        .checkout-amount .label { font-size: 13px; color: #6b7280; margin-bottom: 8px; }
        .checkout-amount .value { font-size: 36px; font-weight: 800; color: #1a1a2e; }
        .checkout-amount .order-id { font-size: 12px; color: #9ca3af; margin-top: 8px; }
        .checkout-section {
            padding: 24px;
            border-bottom: 8px solid #f5f5f5;
        }
        .checkout-section h2 {
            font-size: 15px; font-weight: 700; color: #1f2937;
            margin-bottom: 16px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600;
            color: #374151; margin-bottom: 6px;
        }
        .form-group select,
        .form-group input {
            width: 100%; padding: 14px; border: 1px solid #d1d5db;
            border-radius: 8px; font-size: 15px; outline: none;
            transition: border-color 0.2s;
        }
        .form-group select:focus,
        .form-group input:focus { border-color: #1a1a2e; }
        .checkout-footer {
            padding: 24px;
            position: sticky;
            bottom: 0;
            background: white;
            border-top: 1px solid #e5e7eb;
        }
        .btn-pay {
            width: 100%; padding: 16px; background: #1a1a2e; color: white;
            border: none; border-radius: 12px; font-size: 17px; font-weight: 700;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-pay:hover { background: #16213e; }
        .btn-pay:disabled { background: #9ca3af; cursor: not-allowed; }
        .status-area {
            margin-top: 16px; padding: 16px; border-radius: 12px;
            text-align: center; font-size: 14px; display: none;
        }
        .status-processing { background: #eff6ff; color: #1d4ed8; }
        .status-success { background: #ecfdf5; color: #059669; }
        .status-fail { background: #fef2f2; color: #dc2626; }
        .btn-action {
            display: inline-block; margin-top: 12px; padding: 10px 24px;
            color: white; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none;
        }
        .btn-action.success { background: #059669; }
        .btn-action.success:hover { background: #047857; }
        .btn-action.retry { background: #dc2626; }
        .btn-action.retry:hover { background: #b91c1c; }
        .pg-badge {
            text-align: center; padding: 12px; font-size: 11px; color: #9ca3af;
        }
        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid #1d4ed8; border-top: 2px solid transparent;
            border-radius: 50%; animation: spin 1s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <button class="back-btn" id="btn-back">&larr;</button>
            <h1>결제하기</h1>
        </div>

        <div class="checkout-amount">
            <div class="label">결제 금액</div>
            <div class="value" id="display-amount">0원</div>
            <div class="order-id" id="display-order-id"></div>
        </div>

        <div id="payment-form">
            <div class="checkout-section">
                <h2>결제 수단</h2>
                <div class="form-group">
                    <label>카드 종류</label>
                    <select id="card-type">
                        <option value="SAMSUNG">삼성카드</option>
                        <option value="KB">KB카드</option>
                        <option value="HYUNDAI">현대카드</option>
                        <option value="LOTTE">롯데카드</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>카드 번호</label>
                    <input id="card-no" type="text" placeholder="1234-5678-9012-3456" maxlength="19">
                </div>
            </div>

            <div class="checkout-footer">
                <button class="btn-pay" id="btn-pay">결제하기</button>
                <div class="status-area" id="status-area"></div>
            </div>
        </div>

        <div class="pg-badge">PG Payment Simulator &copy; 2026</div>
    </div>

    <script type="module">
        import { PaymentApi, OrderApi } from './js/api.js';

        const params = new URLSearchParams(location.search);
        const orderId = Number(params.get('orderId'));
        const amount = Number(params.get('amount'));
        const returnUrl = params.get('returnUrl') || '/shop/index.html#mypage';

        document.getElementById('btn-back').addEventListener('click', () => {
            location.href = returnUrl;
        });

        if (!orderId || !amount) {
            document.getElementById('payment-form').innerHTML =
                '<div style="padding:60px 24px;text-align:center;color:#dc2626">잘못된 접근입니다. 주문 정보가 없습니다.</div>';
            document.getElementById('display-amount').textContent = '0원';
        } else {
            document.getElementById('display-amount').textContent = amount.toLocaleString() + '원';
            document.getElementById('display-order-id').textContent = '주문번호 #' + orderId;
            initPaymentForm();
        }

        function initPaymentForm() {
            const btnPay = document.getElementById('btn-pay');
            const statusArea = document.getElementById('status-area');
            const cardNoInput = document.getElementById('card-no');

            cardNoInput.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, '').substring(0, 16);
                let formatted = v.match(/.{1,4}/g)?.join('-') || v;
                e.target.value = formatted;
            });

            btnPay.addEventListener('click', async () => {
                const cardType = document.getElementById('card-type').value;
                const cardNo = cardNoInput.value.trim();

                if (!cardNo || cardNo.replace(/-/g, '').length < 16) {
                    showStatus('fail', '카드 번호 16자리를 입력해주세요.');
                    return;
                }

                btnPay.disabled = true;
                btnPay.textContent = '결제 처리 중...';
                showStatus('processing', '<span class="spinner"></span>PG사에 결제를 요청하고 있습니다...');

                try {
                    await PaymentApi.request({ orderId, cardType, cardNo });
                    showStatus('processing', '<span class="spinner"></span>결제 승인 처리 중입니다...');
                    pollOrderStatus();
                } catch (e) {
                    showStatus('fail',
                        e.message + '<br><button class="btn-action retry" id="btn-retry">다시 시도</button>');
                    document.getElementById('btn-retry').addEventListener('click', () => {
                        btnPay.disabled = false;
                        btnPay.textContent = '결제하기';
                        statusArea.style.display = 'none';
                    });
                }
            });

            function pollOrderStatus() {
                const maxAttempts = 15;
                let attempts = 0;

                const interval = setInterval(async () => {
                    attempts++;
                    try {
                        const order = await OrderApi.get(orderId);
                        if (order.status === 'ORDERED') {
                            clearInterval(interval);
                            onPaymentComplete('SUCCESS');
                        } else if (attempts >= maxAttempts) {
                            clearInterval(interval);
                            onPaymentComplete('TIMEOUT');
                        }
                    } catch {
                        if (attempts >= maxAttempts) {
                            clearInterval(interval);
                            onPaymentComplete('TIMEOUT');
                        }
                    }
                }, 2000);
            }

            function onPaymentComplete(status) {
                if (status === 'SUCCESS') {
                    showStatus('success',
                        '결제가 완료되었습니다!<br>' +
                        '<a class="btn-action success" href="/shop/index.html#mypage">주문 내역 보기</a>');
                } else {
                    showStatus('fail',
                        '처리 중입니다. 주문 내역에서 확인해주세요.<br>' +
                        '<a class="btn-action retry" href="/shop/index.html#mypage">주문 내역 보기</a>');
                }
                btnPay.style.display = 'none';
            }

            function showStatus(type, html) {
                statusArea.className = 'status-area status-' + type;
                statusArea.innerHTML = html;
                statusArea.style.display = 'block';
            }
        }
    </script>
</body>
</html>
