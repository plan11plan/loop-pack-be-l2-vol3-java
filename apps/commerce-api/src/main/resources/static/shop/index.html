<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopers Shop</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="header-inner">
            <a href="#home" class="logo">Loopers Shop</a>
            <nav class="nav" id="main-nav">
                <a href="#home" class="nav-link active" data-page="home">상품</a>
                <a href="#coupons" class="nav-link" data-page="coupons">쿠폰</a>
                <a href="#mypage" class="nav-link" data-page="mypage">마이페이지</a>
            </nav>
            <div class="header-actions" id="header-actions"></div>
        </div>
    </header>

    <!-- 메인 -->
    <main class="main" id="app"></main>

    <!-- 모달 -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- 토스트 -->
    <div class="toast-container" id="toast-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
