<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopers 관리자 콘솔</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>Loopers Admin</h2>
        </div>
        <ul class="nav-menu">
            <li><a href="#" data-tab="dashboard" class="nav-link active">대시보드</a></li>
            <li><a href="#" data-tab="brands" class="nav-link">브랜드 관리</a></li>
            <li><a href="#" data-tab="products" class="nav-link">상품 관리</a></li>
            <li><a href="#" data-tab="orders" class="nav-link">주문 관리</a></li>
            <li><a href="#" data-tab="coupons" class="nav-link">쿠폰 관리</a></li>
            <li><a href="#" data-tab="users" class="nav-link">유저 관리</a></li>
            <li class="nav-divider"></li>
            <li><a href="#" data-tab="data-generator" class="nav-link highlight">데이터 생성기</a></li>
        </ul>
    </nav>

    <main class="content">
        <div id="tab-dashboard" class="tab-panel active"></div>
        <div id="tab-brands" class="tab-panel"></div>
        <div id="tab-products" class="tab-panel"></div>
        <div id="tab-orders" class="tab-panel"></div>
        <div id="tab-coupons" class="tab-panel"></div>
        <div id="tab-users" class="tab-panel"></div>
        <div id="tab-data-generator" class="tab-panel"></div>
    </main>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="window.Modal.close()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
